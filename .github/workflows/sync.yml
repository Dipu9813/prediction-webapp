name: Sync live match scores

# Pulls fixtures + live scores from football-data.org into Supabase by calling
# the deployed app's /api/sync endpoint. GitHub's minimum schedule is 5 minutes.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call /api/sync
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "::error::APP_URL secret is not set"; exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET secret is not set"; exit 1
          fi
          echo "Calling ${APP_URL}/api/sync"
          body=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL}/api/sync")
          code=$(echo "$body" | tail -n1)
          echo "Sync responded with HTTP $code"
          echo "Response body: $(echo "$body" | sed '$d')"
          test "$code" = "200"
